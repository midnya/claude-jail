services:
  claude:
    image: claude-jail${JAIL_IMAGE_SUFFIX:-}
    build:
      context: ./docker/claude
      args:
        EXTRA_APT_PACKAGES: ${JAIL_APT_PACKAGES:-}

    networks:
      - jail-internal
    dns:
      - ${JAIL_DNS_IP}
    depends_on:
      squid:
        condition: service_healthy
      dns:
        condition: service_healthy

    environment:
      CLAUDE_CODE_ENABLE_TELEMETRY: 0
      CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY: 1
      DISABLE_AUTOUPDATER: 1
      COLORTERM: truecolor

      CLAUDE_APPEND_SYSTEM_PROMPT: ${CLAUDE_APPEND_SYSTEM_PROMPT:-}
      CLAUDE_JAIL_PERMISSION_MODE: ${CLAUDE_JAIL_PERMISSION_MODE:-}

      HTTP_PROXY: http://squid:3128
      HTTPS_PROXY: http://squid:3128
      http_proxy: http://squid:3128
      https_proxy: http://squid:3128
      NO_PROXY: localhost,127.0.0.1,::1
      no_proxy: localhost,127.0.0.1,::1
    volumes:
      - type: bind
        source: ${HOME}/.claude-jail-${JAIL_USER}
        target: /home/claude/.claude
        bind:
          create_host_path: false
      - type: bind
        source: ${HOME}/.claude-jail-${JAIL_USER}.json
        target: /home/claude/.claude.json
        bind:
          create_host_path: false

      - type: volume
        source: jail-tmp
        target: /tmp
    working_dir: ${JAIL_WORKDIR:-/workspace}

  squid:
    image: claude-jail-squid
    build: ./docker/squid
    networks:
      - jail-internal
      - jail-egress
    dns:
      - ${JAIL_DNS_IP}
    depends_on:
      dns:
        condition: service_healthy
    environment:
      JAIL_SQUID_ACL: ${JAIL_SQUID_ACL:-}
    volumes:
      - type: volume
        source: jail-squid-logs
        target: /var/log/squid
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  dns:
    image: claude-jail-unbound
    build: ./docker/unbound
    networks:
      jail-internal:
        ipv4_address: ${JAIL_DNS_IP}
      jail-egress: {}
    environment:
      JAIL_DNS_ACL: ${JAIL_DNS_ACL:-}
      JAIL_NET_SUBNET: ${JAIL_NET_SUBNET:-}
    volumes:
      - type: volume
        source: jail-dns-logs
        target: /var/log/unbound
    healthcheck:
      # Resolve an always-allowed name rather than just `localhost`: this proves
      # the resolver actually answers allowed queries (forwarding/recursion
      # works), so a blocked upstream or a broken allowlist fails loudly here
      # instead of letting claude/squid start against a dead DNS layer.
      # `+short | grep .` rejects REFUSED/SERVFAIL, which dig's exit code does not.
      test: ["CMD-SHELL",
             "dig +time=3 +tries=1 @127.0.0.1 anthropic.com NS +short | grep -q ."]
      interval: 5s
      timeout: 4s
      retries: 6
      start_period: 10s

networks:
  jail-internal:
    internal: true
    ipam:
      config:
        - subnet: ${JAIL_NET_SUBNET}
  jail-egress:

volumes:
  jail-tmp:
    name: claude-jail-tmp-${JAIL_ID}
  jail-squid-logs:
    name: claude-jail-squid-logs-${JAIL_ID}-${JAIL_EGRESS_ID}
  jail-dns-logs:
    name: claude-jail-dns-logs-${JAIL_ID}-${JAIL_EGRESS_ID}
