services:
  claude-jail:
    image: claude-jail
    build: ./docker/claude

    networks:
      - jail-internal
    depends_on:
      squid:
        condition: service_healthy

    environment:
      CLAUDE_CODE_ENABLE_TELEMETRY: 0
      CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY: 1
      DISABLE_AUTOUPDATER: 1
      COLORTERM: truecolor

      CLAUDE_APPEND_SYSTEM_PROMPT: ${CLAUDE_APPEND_SYSTEM_PROMPT:-}
      CLAUDE_JAIL_PERMISSION_MODE: ${CLAUDE_JAIL_PERMISSION_MODE:-}

      HTTP_PROXY: http://squid:3128
      HTTPS_PROXY: http://squid:3128
      http_proxy: http://squid:3128
      https_proxy: http://squid:3128
      NO_PROXY: localhost,127.0.0.1,::1
      no_proxy: localhost,127.0.0.1,::1
    volumes:
      - type: bind
        source: ${HOME}/.claude-jail-${JAIL_USER}
        target: /home/claude/.claude
        bind:
          create_host_path: false
      - type: bind
        source: ${HOME}/.claude-jail-${JAIL_USER}.json
        target: /home/claude/.claude.json
        bind:
          create_host_path: false

      - type: volume
        source: jail-tmp
        target: /tmp
    working_dir: ${JAIL_WORKDIR:-/workspace}

  squid:
    image: claude-jail-squid
    build: ./docker/squid
    networks:
      - jail-internal
      - jail-egress
    volumes:
      - type: volume
        source: jail-squid-logs
        target: /var/log/squid
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  jail-internal:
    internal: true
  jail-egress:

volumes:
  jail-tmp:
    name: claude-jail-tmp-${JAIL_ID}
  jail-squid-logs:
    name: claude-jail-squid-logs-${JAIL_ID}
