server:
    chroot: ""
    pidfile: ""
    username: ""
    directory: "/etc/unbound"
    interface: 0.0.0.0
    # Default-refuse for everyone but loopback; the jail-internal subnet is
    # allowed via the generated jail-dns.conf (entrypoint injects it from
    # JAIL_NET_SUBNET). The resolver also sits on jail-egress, so a blanket
    # allow would expose an open recursive resolver there.
    access-control: 127.0.0.0/8 allow
    do-ip6: no
    # Needed so the forward-zone below may target docker's embedded resolver,
    # which lives on loopback (127.0.0.11).
    do-not-query-localhost: no
    verbosity: 1
    log-queries: yes
    log-replies: yes
    use-syslog: no
    logfile: "/var/log/unbound/unbound.log"
    include: "/etc/unbound/jail-dns.conf"

# Resolve allowed names via docker's embedded DNS (the jail's pre-Unbound path)
# first, falling back to our own recursion if it can't answer. The embedded
# resolver returns a complete CNAME chain, so an allowed name fronted by a CDN
# in a non-allowlisted zone still resolves; and a host that blocks direct
# outbound :53 still gets answers through it. local-zone "." refuse is applied
# before forwarding, so refused names are never forwarded out.
forward-zone:
    name: "."
    forward-addr: 127.0.0.11
    forward-first: yes
